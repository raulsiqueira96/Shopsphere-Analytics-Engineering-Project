macros: 
  - name: cents_to_dollars
    description: |
      Converts an amount in cents to dollars, with an optional parameter to specify the number of decimal places (default is 2).
    arguments:
      - name: column_name
        description: The name of the column containing the amount in cents.
        type: string
      - name: decimals
        description: The number of decimal places to round the result to (default is 2).
        type: integer